name: ColimaBar
options:
  bundleIdPrefix: dev.dreuse
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.3.4"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  ColimaBar:
    type: application
    platform: macOS
    sources:
      - path: ColimaBar
        excludes:
          - "Resources/Info.plist"
          - "Resources/ColimaBar.entitlements"
    resources:
      - path: ColimaBar/Assets.xcassets
    info:
      path: ColimaBar/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: ColimaBar
        CFBundleDisplayName: ColimaBar
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "Copyright © dreuse. All rights reserved."
        NSAppleEventsUsageDescription: "ColimaBar needs to run colima and docker commands on your behalf."
    entitlements:
      path: ColimaBar/Resources/ColimaBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dreuse.ColimaBar
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ColimaBar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ColimaBar/Resources/ColimaBar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  ColimaBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ColimaBarTests
    dependencies:
      - target: ColimaBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dreuse.ColimaBarTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ColimaBar:
    build:
      targets:
        ColimaBar: all
        ColimaBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ColimaBarTests
    archive:
      config: Release
